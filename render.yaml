# ──────────────────────────────────────────────────────────────────
# Render Blueprint — Deploy Automatizado do Arandu
# ──────────────────────────────────────────────────────────────────
# Use este arquivo com a funcionalidade "Blueprint" do Render:
#   New + → Blueprint → Conecte o repositório GitHub
# Ele criará automaticamente os dois serviços abaixo.
# ──────────────────────────────────────────────────────────────────

services:

  # ────────────────────────────────────────────────────────────────
  # 1. API — NestJS + Prisma (Web Service)
  # ────────────────────────────────────────────────────────────────
  - type: web
    name: arandu-api
    env: node
    region: ohio
    plan: free
    # ── Build ──
    buildCommand: yarn install && npx turbo run build --filter=api
    # ── Runtime ──
    startCommand: node apps/api/dist/main.js
    healthCheckPath: /api/health
    # ── Pós-deploy: sincroniza schema do Prisma (antes de aceitar tráfego) ──
    # Usa `db push` em vez de `migrate deploy` para compatibilidade tanto com
    # SQLite local quanto com Turso/LibSQL (distribuído). Se preferir migrations
    # versionadas, troque para: yarn workspace api prisma migrate deploy
    postDeployCommand: yarn workspace api prisma db push
    # ── Build Filters (evita build quando só o frontend mudou) ──
    filters:
      - paths:
          - apps/api/**
          - package.json
          - yarn.lock
          - turbo.json
    # ── Variáveis de Ambiente ──
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
        # ☝️ Preencher manualmente com URL do Turso/LibSQL ou SQLite
        #    Ex: libsql://arandu-prod-username.turso.io?authToken=xxxx
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://arandu-frontend.onrender.com
      # ── SMTP (Nodemailer) — opcional ──
      # Se não configurado, e-mails são logados no console (útil para testes).
      # Para envio real, configure um serviço SMTP (ex: Gmail, SendGrid, Mailgun, etc.)
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false


  # ────────────────────────────────────────────────────────────────
  # 2. Frontend — React + Vite (Static Site)
  # ────────────────────────────────────────────────────────────────
  - type: web
    name: arandu-frontend
    env: static
    region: ohio
    buildCommand: yarn install && npx turbo run build --filter=frontend
    staticPublishPath: ./apps/frontend/dist
    # ── Build Filters (evita build quando só a API mudou) ──
    filters:
      - paths:
          - apps/frontend/**
          - package.json
          - yarn.lock
          - turbo.json
    # ── SPA Fallback — React Router ──
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # ── Variáveis de Ambiente ──
    envVars:
      - key: VITE_API_URL
        value: https://arandu-api.onrender.com/api
