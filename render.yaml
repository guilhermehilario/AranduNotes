services:
  # -------------------------------------------------------------
  # 1. SERVIÇO DA API (NestJS + Prisma)
  # -------------------------------------------------------------
  - type: web
    name: arandu-api
    env: node
    region: ohio # Ou a região de sua preferência (ex: oregon, frankfurt)
    plan: free
    # Roda o install da raiz e faz o build filtrando apenas a API no Turbo
    buildCommand: yarn install && npx turbo run build --filter=api
    # Executa a API compilada
    startCommand: node apps/api/dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # Você preencherá manualmente no painel do Render
      - key: JWT_SECRET
        generateValue: true

  # -------------------------------------------------------------
  # 2. SERVIÇO DO FRONTEND (Vite / React - Static Site)
  # -------------------------------------------------------------
  - type: web
    name: arandu-frontend
    env: static
    buildCommand: yarn install && npx turbo run build --filter=frontend
    # O Vite gera os arquivos compilados dentro de apps/frontend/dist
    staticPublishPath: ./apps/frontend/dist
    # Reescreve as rotas para o SPA (React Router) funcionar no refresh
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://arandu-api.onrender.com # URL da sua API no Render
