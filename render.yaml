# ──────────────────────────────────────────────────────────────────
# Render Blueprint — Deploy Automatizado do Arandu
# ──────────────────────────────────────────────────────────────────
# Use este arquivo com a funcionalidade "Blueprint" do Render:
#   New + → Blueprint → Conecte o repositório GitHub
# Ele criará automaticamente os dois serviços abaixo.
# ──────────────────────────────────────────────────────────────────

services:

  # ────────────────────────────────────────────────────────────────
  # 1. API — NestJS + Prisma (Web Service)
  # ────────────────────────────────────────────────────────────────
  - type: web
    name: arandu-api
    env: node
    region: ohio
    plan: free
    # ── Build ──
    buildCommand: yarn install && npx turbo run build --filter=api
    # ── Runtime ──
    startCommand: node apps/api/dist/main.js
    healthCheckPath: /health
    # ── Build Filters (evita build quando só o frontend mudou) ──
    filters:
      - paths:
          - apps/api/**
          - package.json
          - yarn.lock
          - turbo.json
    # ── Variáveis de Ambiente ──
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false       # Preencher manualmente no painel do Render
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://arandu-frontend.onrender.com


  # ────────────────────────────────────────────────────────────────
  # 2. Frontend — React + Vite (Static Site)
  # ────────────────────────────────────────────────────────────────
  - type: web
    name: arandu-frontend
    env: static
    region: ohio
    buildCommand: yarn install && npx turbo run build --filter=frontend
    staticPublishPath: ./apps/frontend/dist
    # ── Build Filters (evita build quando só a API mudou) ──
    filters:
      - paths:
          - apps/frontend/**
          - package.json
          - yarn.lock
          - turbo.json
    # ── SPA Fallback — React Router ──
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # ── Variáveis de Ambiente ──
    envVars:
      - key: VITE_API_URL
        value: https://arandu-api.onrender.com/api
