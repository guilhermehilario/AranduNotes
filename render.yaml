# ──────────────────────────────────────────────────────────
# Render.com — Static Site (Frontend SPA)
# Configuração de rotas para Single Page Application
# ──────────────────────────────────────────────────────────
# Para aplicar esta config automaticamente:
#   - Conecte o repositório ao Render como "Blueprint"
#   - Ou copie as regras manualmente no Dashboard:
#     Dashboard → Static Site → Redirects/Rewrites
#     Source: /* → Destination: /index.html → Action: Rewrite
# ──────────────────────────────────────────────────────────

services:
  - type: static
    name: caderno-notacoes-frontend
    # ⚠️ Substitua pelo caminho real do seu repositório
    # Exemplo: https://github.com/fulano/arandu
    repo: https://github.com/SEU_USUARIO/SEU_REPO
    branch: main
    buildCommand: cd frontend && yarn build
    publishPath: frontend/dist
    headers:
      - path: /**
        name: X-Frame-Options
        value: DENY
      - path: /**
        name: X-Content-Type-Options
        value: nosniff
      - path: /**
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    redirects:
      - source: /*
        destination: /index.html
        type: rewrite
